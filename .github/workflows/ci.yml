name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python: lint (ruff + black --check), type-check (mypy on libs), and run the
  # pure-python test suite (`-m "not integration"` — no Docker in CI).
  # Local packages are pip install -e'd in dependency order (contracts -> platform
  # -> gov-sdk -> services); sibling packages are NEVER PyPI deps.
  # ---------------------------------------------------------------------------
  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip + install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 black==24.8.0 mypy==1.11.2

      - name: Install local packages (dependency order)
        run: |
          set -euo pipefail
          # Libs first, in the load-bearing order.
          for pkg in libs/edis-contracts libs/edis-platform libs/edis-governance-sdk; do
            echo "::group::pip install -e $pkg"
            pip install -e "$pkg[dev]" || pip install -e "$pkg"
            echo "::endgroup::"
          done
          # Then any services that already exist (built by later work units).
          for svc in apps/ingestion services/integration services/intelligence \
                     services/decision services/copilot services/governance services/gateway; do
            if [ -f "$svc/pyproject.toml" ]; then
              echo "::group::pip install -e $svc"
              pip install -e "$svc[dev]" || pip install -e "$svc"
              echo "::endgroup::"
            fi
          done

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (libs)
        run: |
          mypy libs/edis-contracts/edis_contracts \
               libs/edis-platform/edis_platform \
               libs/edis-governance-sdk/edis_gov_sdk

      - name: Pytest (unit; integration tests skipped — no Docker)
        run: pytest -m "not integration"

  # ---------------------------------------------------------------------------
  # Node: build the TypeScript Zod contracts (libs/edis-ts-contracts) and run the
  # drift check that asserts the generated TS matches the Pydantic source of truth
  # (F6). Skips cleanly until that package lands.
  # ---------------------------------------------------------------------------
  ts-contracts:
    name: ts-contracts (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TS contracts package
        id: detect
        run: |
          if [ -f libs/edis-ts-contracts/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "libs/edis-ts-contracts not present yet (built by work unit F6); skipping."
          fi

      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: libs/edis-ts-contracts/package-lock.json

      - name: Install + build + drift check
        if: steps.detect.outputs.present == 'true'
        working-directory: libs/edis-ts-contracts
        run: |
          npm ci
          npm run build
          # Regenerate from the Pydantic contracts and fail if the working tree drifts.
          npm run check:drift
