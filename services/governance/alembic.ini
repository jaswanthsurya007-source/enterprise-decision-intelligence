# Alembic configuration for the EDIS governance service (L7).
#
# Run from this directory:  alembic upgrade head
# (the Makefile `migrate` target does `cd services/governance && alembic upgrade head`).
#
# env.py reads EDIS_DATABASE_URL from the environment (falling back to the dev
# DSN) so the same migrations apply in CI, compose, and locally.

[alembic]
# Path to migration scripts, relative to this ini file. The governance env.py
# and versions live under app/migrations (per the repo layout in ARCHITECTURE §8).
script_location = app/migrations

file_template = %%(rev)s_%%(slug)s
timezone = UTC
prepend_sys_path = .

# Injected from EDIS_DATABASE_URL by env.py at runtime; placeholder only.
sqlalchemy.url = postgresql+asyncpg://edis:edis@localhost:5432/edis

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
