# Alembic configuration for the EDIS decision service (L4).
#
# Run from this directory:  alembic upgrade head
# (the Makefile `migrate` target does `cd services/decision && alembic upgrade head`).
#
# The async database URL is NOT hard-coded here: env.py reads EDIS_DATABASE_URL
# from the environment (falling back to the dev DSN) so the same migrations apply
# in CI, compose, and locally without editing this file.

[alembic]
# Path to migration scripts, relative to this ini file.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in generated migrations (UTC, per project convention).
timezone = UTC

# Prepend this directory to sys.path so env.py can import local modules if needed.
prepend_sys_path = .

# sqlalchemy.url is intentionally left blank — env.py injects it from
# EDIS_DATABASE_URL at runtime. A placeholder keeps tooling happy.
sqlalchemy.url = postgresql+asyncpg://edis:edis@localhost:5432/edis

[post_write_hooks]
# No autogenerate hooks — these migrations are hand-authored DDL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
