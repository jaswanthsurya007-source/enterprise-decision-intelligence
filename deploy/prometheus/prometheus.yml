# Prometheus scrape config for the EDIS dev topology.
#
# EDIS services export metrics via OpenTelemetry (OTLP) to the otel-collector,
# which re-exposes them on a Prometheus endpoint (:8889). Prometheus scrapes that
# single endpoint for all app metrics, plus Redpanda's native /metrics. This keeps
# every service free of a Prometheus client; they only speak OTLP.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: edis-dev

scrape_configs:
  # The collector aggregates OTLP metrics from every EDIS service and re-exports
  # them here. App metrics (llm_tokens_total, cache_hit_ratio, grounding_pass_rate,
  # ingest_rate, dlq_rate, consumer_lag, detection_latency, ...) arrive via this job.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          source: otel

  # The collector's own internal telemetry (pipeline health, queue sizes).
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          source: otel-internal

  # Redpanda exposes Prometheus metrics on the admin port (consumer-group lag, etc).
  - job_name: redpanda
    metrics_path: /metrics
    static_configs:
      - targets: ["redpanda:9644"]
        labels:
          source: redpanda

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
