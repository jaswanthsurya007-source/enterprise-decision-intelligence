# Grafana dashboard provisioning (Z2).
#
# Tells Grafana to load every dashboard JSON under /var/lib/grafana/dashboards
# (the read-only mount of deploy/grafana/dashboards) into the "EDIS" folder on
# startup and to hot-reload changes. `foldersFromFilesStructure` is left off:
# all four EDIS dashboards live in one flat directory.

apiVersion: 1

providers:
  - name: edis
    orgId: 1
    folder: EDIS
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
